name: OpenCode - 自动审查 Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write
  issues: write

jobs:
  opencode-review:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: 执行 OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_BASE_URL: ${{ secrets.OPENCODE_API_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: gpt-5.5
          use_github_token: true
          prompt: |
            审查此 Pull Request:
            - 检查是否有潜在BUG
            - 给出具体的代码优化建议
            - 识别可能的安全隐患
            - 必须使用简体中文回复
            - 针对有问题的代码行添加行内评论
            - 如果代码质量良好，请明确说明"本次提交代码质量良好，无明显问题"
