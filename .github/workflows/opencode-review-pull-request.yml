name: OpenCode - 自动审查 Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write
  issues: write

jobs:
  opencode-review:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: 生成临时OpenCode配置
        run: |
          cat > opencode.json << EOF
          {
            "$schema": "https://opencode.ai/config.json",
            "model": "my-custom-provider/gpt-5.5",
            "provider": {
              "my-custom-provider": {
                "npm": "@ai-sdk/openai-compatible",
                "name": "我的自定义API",
                "options": {
                  "baseURL": "{env:OPENCODE_API_BASE_URL}",
                  "apiKey": "{env:OPENCODE_API_KEY}"
                },
                "models": {
                  "gpt-5.5": {
                    "name": "GPT-5.5"
                  }
                }
              }
            }
          }
          EOF
        env:
          OPENCODE_API_BASE_URL: ${{ secrets.OPENCODE_API_BASE_URL }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}

      - name: 执行 OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: my-custom-provider/gpt-5.5
          use_github_token: true
          prompt: |
            审查此 Pull Request:
            - 检查是否有潜在BUG
            - 给出具体的代码优化建议
            - 识别可能的安全隐患
            - 必须使用简体中文回复
            - 针对有问题的代码行添加行内评论
            - 如果代码质量良好，请明确说明"本次提交代码质量良好，无明显问题"

      - name: 清理临时配置文件
        if: always()
        run: rm -f opencode.json